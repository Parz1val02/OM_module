server:
  http_listen_port: 9081

positions:
  filename: /tmp/positions-ran.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ran-srslte
    static_configs:
      - targets: [localhost]
        labels:
          job: ran
          domain: ran
          component: srslte
          __path__: /var/log/srslte/*.log

  - job_name: ran-srsran
    static_configs:
      - targets: [localhost]
        labels:

          job: ran
          domain: ran
          component: srsran
          __path__: /var/log/srsran/*.log
