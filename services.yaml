services:
  om-module:
    build: ./om-module
    image: docker_om_module
    container_name: om-module
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./om-module:/mnt/om-module
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - TEMPO_ENDPOINT=tempo:4318
      - LOKI_URL=http://loki:3100
      - TRACE_QUERY_WINDOW=10m
      # Set to "false" to disable the capture pipeline without rebuilding
      - CAPTURE_ENABLED=true
      # Bridge interface to capture on.
      # "auto" = dynamic discovery via Docker network inspection (recommended).
      # Set to explicit name (e.g. "br-c91787205592") to bypass discovery.
      - CAPTURE_INTERFACE=auto
      # How long the correlator waits before flushing an in-flight procedure
      # as timed out and triggering the log-based reconstructor as fallback.
      - PROCEDURE_TIMEOUT=30s
      - MCC=${MCC}
      - MNC=${MNC}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    extra_hosts:
      - "loki:${LOKI_IP}"
      - "tempo:${TEMPO_IP}"
      - "prometheus:${METRICS_IP}"
      - "grafana:${GRAFANA_IP}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    labels:
      om.domain: "observability"
      om.nf: "om-module"
      om.generation: "none"
      om.project: "golang"
      prometheus.scrape: "false"
      #prometheus.port: "8080"
      #prometheus.path: "/metrics"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yml
    env_file:
      - .env
    volumes:
      - loki-data:/loki
      - ./loki:/etc/loki:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3100:3100"
    networks:
      default:
        ipv4_address: ${LOKI_IP}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      om.domain: "observability"
      om.nf: "loki"
      om.generation: "none"
      om.project: "grafana"

  promtail-core:
    image: grafana/promtail:3.0.0
    container_name: promtail-core
    command: -config.file=/etc/promtail/config.yml
    env_file:
      - .env
    volumes:
      - ./promtail/core/:/etc/promtail
      - promtail_positions:/tmp/promtail
      - open5gs_5g_logs:/var/log/open5gs/5g:ro
      - open5gs_4g_logs:/var/log/open5gs/4g:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default:
        ipv4_address: ${PROMTAIL_CORE_IP}
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    labels:
      om.domain: "observability"
      om.nf: "promtail"
      om.generation: "none"
      om.project: "grafana"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "65534:${DOCKER_GID}"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - prometheus-data:/prometheus
      - ./prometheus/configs:/etc/prometheus/configs
      - ./prometheus:/etc/prometheus
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command:
      - --config.file=/etc/prometheus/configs/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --web.external-url=http://localhost:9090
      - --web.enable-remote-write-receiver
    expose:
      - "9090/tcp"
    ports:
      - "9090:9090/tcp"
    networks:
      default:
        ipv4_address: ${METRICS_IP}
    depends_on:
      loki:
        condition: service_healthy
      om-module:
        condition: service_healthy
      json-exporter:
        condition: service_started
    labels:
      om.domain: "observability"
      om.nf: "prometheus"
      om.generation: "none"
      om.project: "prometheus"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      - ./grafana:/mnt/grafana
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_PATHS_DATA=/var/lib/grafana
      - METRICS_IP=${METRICS_IP}
      - OM_MODULE_IP=${OM_MODULE_IP}
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,yesoreyeram-infinity-datasource
      # --- SMTP / alerting ---
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GMAIL_USER}
      - GF_SMTP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GMAIL_USER}
      - GF_SMTP_FROM_NAME=5G Testbed Grafana
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
      - GF_ALERTING_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    expose:
      - "3000/tcp"
    ports:
      - "3000:3000/tcp"
    networks:
      default:
        ipv4_address: ${GRAFANA_IP}
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      om.domain: "observability"
      om.nf: "grafana"
      om.generation: "none"
      om.project: "grafana"

  json-exporter:
    image: quay.io/prometheuscommunity/json-exporter:latest
    container_name: json-exporter
    command:
      - --config.file=/etc/json_exporter/config.yml
    volumes:
      - ./json_exporter/config.yml:/etc/json_exporter/config.yml
    ports:
      - "7979:7979"
    networks:
      default:
        ipv4_address: ${JSON_EXPORTER_IP}
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    labels:
      om.domain: "observability"
      om.nf: "json-exporter"
      om.generation: "none"
      om.project: "prometheus"

  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4318:4318"
    networks:
      default:
        ipv4_address: ${TEMPO_IP}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3200/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      om.domain: "observability"
      om.nf: "tempo"
      om.generation: "none"
      om.project: "grafana"

networks:
  default:
    name: docker_open5gs_default
    ipam:
      config:
        - subnet: ${TEST_NETWORK}
  host:
    name: host
    external: true

volumes:
  prometheus-data:
    name: docker_open5gs_prometheus_data
  grafana-data:
    name: docker_open5gs_grafana_data
  loki-data:
    name: docker_open5gs_loki_data
  tempo-data:
    name: docker_open5gs_tempo_data
  open5gs_5g_logs:
    external: true
    name: open5gs_5g_logs
  open5gs_4g_logs:
    external: true
    name: open5gs_4g_logs
  promtail_positions:
    name: promtail_positions
