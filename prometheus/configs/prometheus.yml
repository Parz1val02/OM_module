global:
  scrape_interval: 15s
  external_labels:
    monitor: 'open5gs-monitor'

scrape_configs:
  - job_name: "docker-services"

    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep

      # To add ports to scrape metrics different than 9091 use |
      # Drop any target whose private port does NOT match the prometheus.port label
      - source_labels: [__meta_docker_port_private]
        regex: "9091"
        action: keep

      # Build the scrape link using the ip assigned to the container
      #- source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_port]
      #  separator: ":"
      #  regex: "(.+):(.+)"
      #  replacement: "${1}:${2}"
      #  target_label: __address__

      # Build the scrape link using the name assigned to the container
      - source_labels: [__meta_docker_container_name, __meta_docker_container_label_prometheus_port]
        separator: ":"
        regex: "/(.*):(.+)"
        replacement: "${1}:${2}"
        target_label: __address__

      - source_labels: [__meta_docker_container_label_prometheus_path]
        target_label: __metrics_path__
        regex: "(.+)"
        action: replace

      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: "/(.*)"

