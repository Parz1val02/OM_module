global:
  scrape_interval: 15s
  external_labels:
    monitor: 'open5gs-monitor'

scrape_configs:
#  - job_name: 'om-module'
#    static_configs:
#      - targets: ['om-module:8080']
#    metrics_path: /health/metrics

  - job_name: 'amf'
    static_configs:
      - targets: ['amf:9091']
  - job_name: 'smf'
    static_configs:
      - targets: ['smf:9091']
  - job_name: 'pcf'
    static_configs:
      - targets: ['pcf:9091']
  - job_name: 'upf'
    static_configs:
      - targets: ['upf:9091']
  - job_name: 'mme'
    static_configs:
      - targets: ['mme:9091']
  - job_name: 'pcrf'
    static_configs:
      - targets: ['pcrf:9091']

  - job_name: 'amf ue info'
    static_configs:
      - targets: ['amf:9091']
    metrics_path: /ue-info
  - job_name: 'amf gnb info'
    static_configs:
      - targets: ['amf:9091']
    metrics_path: /gnb-info
  - job_name: 'mme ue info'
    static_configs:
      - targets: ['mme:9091']
    metrics_path: /ue-info
  - job_name: 'amf gnb info'
    static_configs:
      - targets: ['mme:9091']
    metrics_path: /gnb-info
  - job_name: 'smf pdu info'
    static_configs:
      - targets: ['smf:9091']
    metrics_path: /pdu-info
